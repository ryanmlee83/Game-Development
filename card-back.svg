<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 170">
  <defs>
    <!-- Deep purple radial background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%"   stop-color="#7040b0"/>
      <stop offset="45%"  stop-color="#4a1878"/>
      <stop offset="100%" stop-color="#140530"/>
    </radialGradient>

    <!-- Diagonal cross-hatch (golden lattice) -->
    <pattern id="lp" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#c88010" stroke-width="0.45" stroke-opacity="0.38"/>
    </pattern>
    <pattern id="lm" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#c88010" stroke-width="0.45" stroke-opacity="0.38"/>
    </pattern>

    <!-- Border gradient -->
    <linearGradient id="bord" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#d49520"/>
      <stop offset="50%"  stop-color="#ffd458"/>
      <stop offset="100%" stop-color="#d49520"/>
    </linearGradient>

    <!-- Cell body: subtle lighter centre, dark edge -->
    <radialGradient id="cell" cx="42%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#7a3ccc"/>
      <stop offset="55%"  stop-color="#4a1580"/>
      <stop offset="100%" stop-color="#240548"/>
    </radialGradient>

    <!-- Silver metallic text -->
    <linearGradient id="sil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="20%"  stop-color="#ddd0e8"/>
      <stop offset="50%"  stop-color="#a898b8"/>
      <stop offset="80%"  stop-color="#ddd0e8"/>
      <stop offset="100%" stop-color="#706080"/>
    </linearGradient>

    <!-- Gold Roman numeral -->
    <linearGradient id="gld" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff4b0"/>
      <stop offset="35%"  stop-color="#e8c030"/>
      <stop offset="65%"  stop-color="#b88810"/>
      <stop offset="100%" stop-color="#906808"/>
    </linearGradient>

    <!-- Cell purple glow -->
    <filter id="pglow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="#6020a8" flood-opacity="0.6" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Sparkle glow -->
    <filter id="spark" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feFlood flood-color="#ffcc44" flood-opacity="0.9" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text amber glow -->
    <filter id="tglow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feFlood flood-color="#c89020" flood-opacity="0.55" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Card clip -->
    <clipPath id="card">
      <rect width="124" height="170" rx="7" ry="7"/>
    </clipPath>

    <!--
      Chromosome-pair symbol: two X-shaped condensed chromosomes
      viewBox centred at origin, sized 16×16 to match an r=8 cell
    -->
    <symbol id="chr" viewBox="-8 -8 16 16">
      <!-- Chr 1: upper-left, rotated 20° -->
      <g transform="translate(-2.2,-2) rotate(20)">
        <line x1="-1.5" y1="-2.7" x2="1.5" y2="2.7"
              stroke="#c078ff" stroke-width="1.6" stroke-linecap="round" opacity="0.88"/>
        <line x1="1.5"  y1="-2.7" x2="-1.5" y2="2.7"
              stroke="#c078ff" stroke-width="1.6" stroke-linecap="round" opacity="0.88"/>
        <circle r="0.75" fill="#e4b8ff" opacity="0.95"/>
      </g>
      <!-- Chr 2: lower-right, rotated -13° -->
      <g transform="translate(2.2,2) rotate(-13)">
        <line x1="-1.5" y1="-2.7" x2="1.5" y2="2.7"
              stroke="#c078ff" stroke-width="1.6" stroke-linecap="round" opacity="0.88"/>
        <line x1="1.5"  y1="-2.7" x2="-1.5" y2="2.7"
              stroke="#c078ff" stroke-width="1.6" stroke-linecap="round" opacity="0.88"/>
        <circle r="0.75" fill="#e4b8ff" opacity="0.95"/>
      </g>
    </symbol>
  </defs>

  <!-- ── Background ── -->
  <rect width="124" height="170" rx="7" ry="7" fill="url(#bg)"/>
  <rect width="124" height="170" rx="7" ry="7" fill="url(#lp)" clip-path="url(#card)"/>
  <rect width="124" height="170" rx="7" ry="7" fill="url(#lm)" clip-path="url(#card)"/>

  <!-- ── Border ── -->
  <rect x="4"   y="4"   width="116" height="162" rx="5"   ry="5"
        fill="none" stroke="url(#bord)" stroke-width="1.6"/>
  <rect x="7.5" y="7.5" width="109" height="155" rx="3.5" ry="3.5"
        fill="none" stroke="url(#bord)" stroke-width="0.8" stroke-opacity="0.65"/>

  <!-- Corner flourishes -->
  <path d="M8,19 L8,9 L19,9"          fill="none" stroke="#e8a820" stroke-width="1.1"/>
  <path d="M105,9 L116,9 L116,19"     fill="none" stroke="#e8a820" stroke-width="1.1"/>
  <path d="M8,151 L8,161 L19,161"     fill="none" stroke="#e8a820" stroke-width="1.1"/>
  <path d="M105,161 L116,161 L116,151" fill="none" stroke="#e8a820" stroke-width="1.1"/>

  <!--
    ══ TOP CELL GROUP ══
    Four post-division cells, 2×2 grid, r=8, no membrane overlap
    Columns: x=51 (left), x=73 (right)   gap=6px
    Rows:    y=21 (top),  y=40 (bottom)  gap=3px
    Group spans: x=43–81, y=13–48
  -->
  <!-- TL -->
  <circle cx="51" cy="21" r="8" fill="url(#cell)" filter="url(#pglow)" stroke="#8040d0" stroke-width="1.3"/>
  <use href="#chr" x="43" y="13" width="16" height="16"/>
  <!-- TR -->
  <circle cx="73" cy="21" r="8" fill="url(#cell)" filter="url(#pglow)" stroke="#8040d0" stroke-width="1.3"/>
  <use href="#chr" x="65" y="13" width="16" height="16"/>
  <!-- BL -->
  <circle cx="51" cy="40" r="8" fill="url(#cell)" filter="url(#pglow)" stroke="#8040d0" stroke-width="1.3"/>
  <use href="#chr" x="43" y="32" width="16" height="16"/>
  <!-- BR -->
  <circle cx="73" cy="40" r="8" fill="url(#cell)" filter="url(#pglow)" stroke="#8040d0" stroke-width="1.3"/>
  <use href="#chr" x="65" y="32" width="16" height="16"/>

  <!-- Sparkles – top group -->
  <g transform="translate(32,13)"  filter="url(#spark)"><ellipse rx="3.5" ry="0.8" fill="#ffdd44" opacity="0.85"/><ellipse rx="0.8" ry="3.5" fill="#ffdd44" opacity="0.85"/></g>
  <g transform="translate(93,12)"  filter="url(#spark)"><ellipse rx="3.0" ry="0.7" fill="#ffdd44" opacity="0.80"/><ellipse rx="0.7" ry="3.0" fill="#ffdd44" opacity="0.80"/></g>
  <g transform="translate(27,30)"  filter="url(#spark)"><ellipse rx="2.2" ry="0.6" fill="#ffdd44" opacity="0.62"/><ellipse rx="0.6" ry="2.2" fill="#ffdd44" opacity="0.62"/></g>
  <g transform="translate(98,32)"  filter="url(#spark)"><ellipse rx="2.2" ry="0.6" fill="#ffdd44" opacity="0.62"/><ellipse rx="0.6" ry="2.2" fill="#ffdd44" opacity="0.62"/></g>
  <g transform="translate(62,11)"  filter="url(#spark)"><ellipse rx="1.8" ry="0.5" fill="#ffdd44" opacity="0.50"/><ellipse rx="0.5" ry="1.8" fill="#ffdd44" opacity="0.50"/></g>

  <!--
    ══ TEXT  (centred at x=62, positioned between the two cell groups)
    Top group bottom: y=48.  Bottom group top: y=121.  Available: 73px.
    DIVIDE   baseline y=72   (cap-top ≈ y=57, 9px below cells)
    II       baseline y=89
    CONQUER  baseline y=110  (descender bottom ≈ y=114, 7px above bottom cells)
  -->

  <!-- DIVIDE -->
  <text x="62" y="72"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="19" font-weight="900" letter-spacing="1.5"
        fill="url(#sil)" stroke="#20103a" stroke-width="0.8"
        paint-order="stroke fill"
        filter="url(#tglow)">DIVIDE</text>

  <!-- Rules flanking II -->
  <line x1="28" y1="79" x2="52" y2="79" stroke="#c8a030" stroke-width="0.55" opacity="0.70"/>
  <line x1="72" y1="79" x2="96" y2="79" stroke="#c8a030" stroke-width="0.55" opacity="0.70"/>

  <!-- II -->
  <text x="62" y="90"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="12" font-weight="700" letter-spacing="4"
        fill="url(#gld)" stroke="#201008" stroke-width="0.5"
        paint-order="stroke fill">II</text>

  <!-- Rules below II -->
  <line x1="28" y1="96" x2="52" y2="96" stroke="#c8a030" stroke-width="0.55" opacity="0.70"/>
  <line x1="72" y1="96" x2="96" y2="96" stroke="#c8a030" stroke-width="0.55" opacity="0.70"/>

  <!-- CONQUER -->
  <text x="62" y="112"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="17" font-weight="900" letter-spacing="0.8"
        fill="url(#sil)" stroke="#20103a" stroke-width="0.8"
        paint-order="stroke fill"
        filter="url(#tglow)">CONQUER</text>

  <!--
    ══ BOTTOM CELL GROUP ══
    Mirror of top: columns x=51,73  rows y=129,148  r=8
    Group spans: x=43–81, y=121–156
  -->
  <!-- TL -->
  <circle cx="51" cy="129" r="8" fill="url(#cell)" filter="url(#pglow)" stroke="#8040d0" stroke-width="1.3"/>
  <use href="#chr" x="43" y="121" width="16" height="16"/>
  <!-- TR -->
  <circle cx="73" cy="129" r="8" fill="url(#cell)" filter="url(#pglow)" stroke="#8040d0" stroke-width="1.3"/>
  <use href="#chr" x="65" y="121" width="16" height="16"/>
  <!-- BL -->
  <circle cx="51" cy="148" r="8" fill="url(#cell)" filter="url(#pglow)" stroke="#8040d0" stroke-width="1.3"/>
  <use href="#chr" x="43" y="140" width="16" height="16"/>
  <!-- BR -->
  <circle cx="73" cy="148" r="8" fill="url(#cell)" filter="url(#pglow)" stroke="#8040d0" stroke-width="1.3"/>
  <use href="#chr" x="65" y="140" width="16" height="16"/>

  <!-- Sparkles – bottom group -->
  <g transform="translate(32,121)" filter="url(#spark)"><ellipse rx="3.5" ry="0.8" fill="#ffdd44" opacity="0.85"/><ellipse rx="0.8" ry="3.5" fill="#ffdd44" opacity="0.85"/></g>
  <g transform="translate(93,120)" filter="url(#spark)"><ellipse rx="3.0" ry="0.7" fill="#ffdd44" opacity="0.80"/><ellipse rx="0.7" ry="3.0" fill="#ffdd44" opacity="0.80"/></g>
  <g transform="translate(27,138)" filter="url(#spark)"><ellipse rx="2.2" ry="0.6" fill="#ffdd44" opacity="0.62"/><ellipse rx="0.6" ry="2.2" fill="#ffdd44" opacity="0.62"/></g>
  <g transform="translate(98,140)" filter="url(#spark)"><ellipse rx="2.2" ry="0.6" fill="#ffdd44" opacity="0.62"/><ellipse rx="0.6" ry="2.2" fill="#ffdd44" opacity="0.62"/></g>
  <g transform="translate(62,157)" filter="url(#spark)"><ellipse rx="1.8" ry="0.5" fill="#ffdd44" opacity="0.50"/><ellipse rx="0.5" ry="1.8" fill="#ffdd44" opacity="0.50"/></g>
</svg>
